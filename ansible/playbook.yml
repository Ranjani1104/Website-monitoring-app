- name: Deploy Website Monitoring App from GitHub
  hosts: web
  become: yes

  vars:
    app_dir: /home/ubuntu/app
    repo_url: https://github.com/Ranjani1104/Website-monitoring-app.git

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - git
          - python3
          - python3-pip
          - nginx
        state: present

    - name: Remove existing app directory
      file:
        path: "{{ app_dir }}"
        state: absent

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"

    # ✅ FIX: Create DB folder
    - name: Create instance directory
      file:
        path: "{{ app_dir }}/instance"
        state: directory
        mode: '0777'

    - name: Fix permissions
      file:
        path: "{{ app_dir }}/instance"
        mode: '0777'
        recurse: yes

    - name: Install dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        executable: pip3

    - name: Install Gunicorn
      pip:
        name: gunicorn
        executable: pip3

    # ✅ FIX: Use gunicorn service
    - name: Create gunicorn service
      copy:
        dest: /etc/systemd/system/gunicorn.service
        content: |
          [Unit]
          Description=Gunicorn Website Monitoring App
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/local/bin/gunicorn -w 3 -b 127.0.0.1:8000 main:app
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Start Gunicorn
      systemd:
        name: gunicorn
        enabled: yes
        state: restarted

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              location / {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
